<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dad</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
padding:20px;
}

h1{
color:white;
font-size:40px;
text-shadow:2px 2px 5px black;
}

.message{
background:white;
padding:20px;
border-radius:15px;
margin:20px;
font-size:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.gallery img{
width:45%;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.footer{
margin-top:20px;
color:white;
font-size:18px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
cursor:pointer;
}

button:hover{
background:#e91e63;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Dad 🎂</h1>

<div class="message">
Dear Dad ❤️<br><br>
Wishing you a day filled with happiness, love, and laughter.  
Thank you for always supporting and guiding me.  
You are the best dad in the world!  
<br><br>
🎂 Happy Birthday! 🎂
</div>

<h2 style="color:white;">📸 Our Memories</h2>

<div class="gallery">

<img src="dad1.jpg">
<img src="dad2.jpg">
<img src="dad3.jpg">
<img src="dad4.jpg">

</div>

<br>

<button onclick="alert('Love you Dad ❤️ Happy Birthday!')">
Click for Surprise 🎁
</button>

<div class="footer">
Made with ❤️ by Your Son
</div>

</div>

</body>
</html>
